# MoE Student - Observation Configuration
# =========================================
# Single policy: obs -> policy.onnx -> action
# No token_state, no encoder.
#
# Order MUST match PolicyCfg in g1_29dof_sonic_distill.py exactly.
# Total dimension: 2615
#
# Proprioception history (25 frames):
#   base_ang_vel:      3 x 25 =   75
#   joint_pos_rel:    29 x 25 =  725
#   joint_vel_rel:    29 x 25 =  725
#   last_action:      29 x 25 =  725
#   projected_gravity: 3 x 25 =   75
#
# Future motion reference (10 frames, step 5):
#   future_motion_joint_pos:  29 x 10 = 290

observations:

  # --- Proprioception history (history_length=25, step=1) ---

  - name: "his_base_angular_velocity_25frame_step1"
    enabled: true

  - name: "his_body_joint_positions_25frame_step1"
    enabled: true

  - name: "his_body_joint_velocities_25frame_step1"
    enabled: true

  - name: "his_last_actions_25frame_step1"
    enabled: true

  - name: "his_gravity_dir_25frame_step1"
    enabled: true

  - name: "motion_joint_positions_10frame_step5"
    enabled: true